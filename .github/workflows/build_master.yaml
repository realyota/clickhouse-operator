name: build_master

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write
  packages: write
  attestations: write

jobs:
  build_master:
    name: Build master
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker images
        env:
          DOCKER_ORG: ${{ secrets.DOCKER_ORG }}
          DOCKER_USER: ${{ secrets.DOCKER_USER }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASS }}
        run: |
          export CHO_RELEASE=latest
          export GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          export GOFIPS140=v1.0.0

          echo "${DOCKER_PASS}" | docker login -u $DOCKER_USER --password-stdin docker.io
          echo "Building operator image with SBOM + provenance + metadata capture"
          docker buildx build --progress plain --platform=linux/amd64,linux/arm64 -f dockerfile/operator/Dockerfile         --build-arg GO_VERSION=${GO_VERSION} --build-arg GOFIPS140=${GOFIPS140} -t docker.io/${DOCKER_ORG}/clickhouse-operator:${CHO_RELEASE} --sbom=true --provenance=mode=max --metadata-file operator-build-metadata.json          --pull --push .
          echo "Building metrics-exporter image with SBOM + provenance + metadata capture"
          docker buildx build --progress plain --platform=linux/amd64,linux/arm64 -f dockerfile/metrics-exporter/Dockerfile --build-arg GO_VERSION=${GO_VERSION} --build-arg GOFIPS140=${GOFIPS140} -t docker.io/${DOCKER_ORG}/metrics-exporter:${CHO_RELEASE}    --sbom=true --provenance=mode=max --metadata-file metrics-exporter-build-metadata.json --pull --push .
      - name: Capture release evidence
        env:
          DOCKER_ORG: ${{ secrets.DOCKER_ORG }}
        run: |
          export CHO_RELEASE=latest
          echo "Collecting build metadata + digest + SBOM + provenance into release-evidence/"
          mkdir -p release-evidence
          cp operator-build-metadata.json metrics-exporter-build-metadata.json release-evidence/
          ./dev/release_evidence.sh docker.io/${DOCKER_ORG}/clickhouse-operator:${CHO_RELEASE} release-evidence/
          ./dev/release_evidence.sh docker.io/${DOCKER_ORG}/metrics-exporter:${CHO_RELEASE} release-evidence/
      - name: Upload release evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-master-${{ github.sha }}
          path: release-evidence/
          retention-days: 30
