name: release_evidence_smoketest

on:
  pull_request:
    paths:
      - 'dockerfile/**'
      - 'dev/release_evidence.sh'
      - 'dev/image_build_universal.sh'
      - '.github/workflows/build_branch.yaml'
      - '.github/workflows/build_master.yaml'
      - '.github/workflows/release_evidence_smoketest.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  evidence_smoketest:
    name: Evidence pipeline smoketest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Verify orchestrator script is present
        run: |
          if [ ! -x ./dev/release_evidence.sh ]; then
            echo "evidence-smoketest: orchestrator script ./dev/release_evidence.sh missing or not executable"
            echo "evidence-smoketest: landed in parallel? rebase your PR onto the branch that introduces dev/release_evidence.sh"
            exit 1
          fi
      - name: Install syft (SBOM tool) if missing
        run: |
          if ! command -v syft >/dev/null 2>&1; then
            echo "syft not pre-installed on runner; installing to /usr/local/bin"
            curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          fi
          syft --version
      - name: Build operator + metrics-exporter images locally (amd64 only, no push)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          export GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
          export GOFIPS140=v1.0.0
          export SMOKETAG="smoketest-pr${PR_NUMBER:-manual}"

          echo "Building operator image (smoketest, amd64, --load, SBOM + provenance + metadata)"
          docker buildx build --progress plain --platform=linux/amd64 -f dockerfile/operator/Dockerfile \
            --build-arg GO_VERSION=${GO_VERSION} --build-arg GOFIPS140=${GOFIPS140} \
            -t clickhouse-operator:${SMOKETAG} \
            --sbom=true --provenance=mode=max \
            --metadata-file operator-build-metadata.json \
            --load --pull .

          echo "Building metrics-exporter image (smoketest, amd64, --load, SBOM + provenance + metadata)"
          docker buildx build --progress plain --platform=linux/amd64 -f dockerfile/metrics-exporter/Dockerfile \
            --build-arg GO_VERSION=${GO_VERSION} --build-arg GOFIPS140=${GOFIPS140} \
            -t metrics-exporter:${SMOKETAG} \
            --sbom=true --provenance=mode=max \
            --metadata-file metrics-exporter-build-metadata.json \
            --load --pull .
      - name: Run release_evidence.sh against local images
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          export SMOKETAG="smoketest-pr${PR_NUMBER:-manual}"
          mkdir -p release-evidence
          cp operator-build-metadata.json metrics-exporter-build-metadata.json release-evidence/ || true
          ./dev/release_evidence.sh clickhouse-operator:${SMOKETAG} release-evidence/
          ./dev/release_evidence.sh metrics-exporter:${SMOKETAG}   release-evidence/
      - name: Assert expected evidence artifacts exist and are non-empty
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          export SMOKETAG="smoketest-pr${PR_NUMBER:-manual}"
          for f in \
            "release-evidence/clickhouse-operator__${SMOKETAG}.digest.txt" \
            "release-evidence/clickhouse-operator__${SMOKETAG}.sbom.spdx.json" \
            "release-evidence/metrics-exporter__${SMOKETAG}.digest.txt" \
            "release-evidence/metrics-exporter__${SMOKETAG}.sbom.spdx.json" \
          ; do
            test -s "$f" || { echo "evidence-smoketest: missing or empty $f"; exit 1; }
            echo "OK: $f ($(wc -c <"$f") bytes)"
          done
      - name: Upload smoketest evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: evidence-smoketest-pr${{ github.event.pull_request.number }}
          path: release-evidence/
          retention-days: 7
