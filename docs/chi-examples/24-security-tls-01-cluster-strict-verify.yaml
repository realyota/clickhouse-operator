# Example: enable strict ClickHouse TLS verification at the cluster level.
#
# By default the operator's outbound ClickHouse connection runs with
# InsecureSkipVerify=true (legacy behavior). Setting `verify: Strict` makes the
# operator validate the peer certificate chain against the rootCA you provide
# and check that the hostname in the cert matches what the operator dialed.
#
# Pre-requisites for `verify: Strict` to actually succeed at runtime:
#   1. The ClickHouse server must be listening on HTTPS with a cert signed by
#      the rootCA you put below.
#   2. The cert's Subject Alternative Names (SANs) must include the operator-
#      visible FQDN of each host. If your certs do not list the per-host FQDN,
#      use `serverName:` to override (or — better — re-issue the certs with
#      proper SANs).
#   3. If the cert is self-signed, paste the CA's PEM into `rootCA:`. Both
#      raw-PEM and base64-wrapped PEM are accepted (the operator auto-detects).
apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: secure-strict-verify
spec:
  configuration:
    clusters:
      - name: production
        secure: "yes"
        security:
          clickhouse:
            tls:
              # Strict: verify peer chain + hostname. None preserves legacy behavior.
              verify: Strict
              # rootCA in PEM. base64-wrapping is also tolerated.
              # REPLACE with the CA that signed your ClickHouse server certs.
              rootCA: |
                -----BEGIN CERTIFICATE-----
                <paste your CA PEM here>
                -----END CERTIFICATE-----
              # Optional: pin a specific TLS minimum. "1.2" (default) or "1.3".
              minVersion: "1.2"
              # Optional: override the SNI / cert verify name. Leave empty to let
              # the operator use the dial host (per-host FQDN derived from the
              # cluster shape).
              # serverName: ""
        layout:
          shardsCount: 1
          replicasCount: 2
