# Example: floor TLS at version 1.3 for ClickHouse + ZooKeeper.
#
# Useful for environments that want to reject TLS 1.2 (which is FIPS 140-3
# approved for AES-GCM but still allows some less-preferred cipher suites at
# 1.2-cipher-suite-level). 1.3 also has a more conservative handshake design.
#
# Caveats:
#   - ClickHouse server must support TLS 1.3 — recent ClickHouse builds do.
#   - ZooKeeper / Keeper TLS is configured per-server; some older ZooKeeper
#     deployments do not negotiate 1.3.
apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: tls-13-only
spec:
  configuration:
    zookeeper:
      nodes:
        - host: zookeeper.altinity.svc.cluster.local
          port: 2281
          secure: "yes"
    clusters:
      - name: c1
        secure: "yes"
        security:
          clickhouse:
            tls:
              verify: Strict
              minVersion: "1.3"
          zookeeper:
            tls:
              verify: Strict
              minVersion: "1.3"
        layout:
          shardsCount: 1
