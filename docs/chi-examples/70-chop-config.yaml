apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseOperatorConfiguration"
metadata:
  name: "chop-config-01"
spec:
  ################################################
  ##
  ## Watch Section
  ##
  ################################################
  watch:
    # Namespaces where clickhouse-operator watches for events.
    # Concurrently running operators should watch on different namespaces.
    # `include` and `exclude` accept literal namespace names or regexp patterns.
    # Empty `include` watches the operator's own namespace (or all namespaces when
    # the operator runs in `kube-system`); use [".*"] to force watch-all elsewhere.
    # Empty `exclude` matches none. `exclude` is applied after `include`.
    namespaces:
      include: []
      exclude: []

  clickhouse:
    configuration:
      ################################################
      ##
      ## Configuration Files Section
      ##
      ################################################
      file:
        path:
          # Path to the folder where ClickHouse configuration files common for all instances within a CHI are located.
          common: config.d
          # Path to the folder where ClickHouse configuration files unique for each instance (host) within a CHI are located.
          host: conf.d
          # Path to the folder where ClickHouse configuration files with users settings are located.
          # Files are common for all instances within a CHI.
          user: users.d
      ################################################
      ##
      ## Configuration Users Section
      ##
      ################################################
      user:
        default:
          # Default values for ClickHouse user configuration
          # 1. user/profile - string
          # 2. user/quota - string
          # 3. user/networks/ip - multiple strings
          # 4. user/password - string
          profile: default
          quota: default
          networksIP:
            - "::1"
            - "127.0.0.1"
          password: "default"
      ################################################
      ##
      ## Configuration Network Section
      ##
      ################################################
      network:
        # Default host_regexp to limit network connectivity from outside
        hostRegexpTemplate: "(chi-{chi}-[^.]+\\d+-\\d+|clickhouse\\-{chi})\\.{namespace}\\.svc\\.cluster\\.local$"
    ################################################
    ##
    ## Access to ClickHouse instances
    ##
    ################################################
    access:
      # ClickHouse credentials (username, password and port) to be used by operator to connect to ClickHouse instances
      # for:
      # 1. Metrics requests
      # 2. Schema maintenance
      # User with such credentials can be specified in additional ClickHouse .xml config files,
      # located in `chUsersConfigsPath` folder
      username: "clickhouse_operator"
      password: "clickhouse_operator_password"
      secret:
        # Location of k8s Secret with username and password to be used by operator to connect to ClickHouse instances
        # Can be used instead of explicitly specified username and password
        namespace: ""
        name: ""
      # Port where to connect to ClickHouse instances to
      port: 8123

    ################################################
    ##
    ## Metrics collection
    ##
    ################################################
    metrics:
      timeouts:
        # Timeout used to limit metrics collection request. In seconds.
        # Upon reaching this timeout metrics collection is aborted and no more metrics are collected in this cycle.
        # All collected metrics are returned.
        collect: 9
      # Regexp to match tables in system database to fetch metrics from.
      # Multiple tables can be matched using regexp. Matched tables are merged using merge() table function.
      # Default is "^(metrics|custom_metrics)$" which fetches from both system.metrics and system.custom_metrics.
      tablesRegexp: "^(metrics|custom_metrics)$"
      # List of regexps to match ClickHouse metrics to exclude from export.
      # Regexps match internal metric names before Prometheus normalization and prefixing.
      # Default is the per-CPU OS metrics filter shown below; set to [] to disable.
      excludeRegexp:
        - "^metric\\.(OS.*CPU[0-9]+|CPUFrequencyMHz_[0-9]+)$"

  ################################################
  ##
  ## Security Section (operator-wide defaults; CHI spec can override per-CR
  ## via `spec.configuration.clusters[].security`)
  ##
  ## Shape is target-scoped: security.<target>.<protocol>.<knob>.
  ## ClickHouse-client TLS lives under `clickhouse.tls.*`, ZooKeeper /
  ## Keeper-client TLS under `zookeeper.tls.*`, Kubernetes-client toggles
  ## under `kubernetes.*`. IPC and FIPS are operator-internal — no CHI override.
  ##
  ## Three orthogonal hardening axes live in this block:
  ##   1. security.policy           — TLS-hardening master switch.
  ##   2. security.fips.enforced    — FIPS cryptographic-module gate (Fatals
  ##                                  at startup if binary lacks GOFIPS140).
  ##   3. security.images.policy    — workload supply-chain gate (rejects
  ##                                  CH/Keeper images that lack "fips" in
  ##                                  their tag).
  ## Each axis is opt-in and independent of the other two.
  ##
  ################################################
  security:
    clickhouse:
      # TLS verification for outbound ClickHouse client connections the operator
      # makes (schemer, health probes, /metrics scraping helpers).
      #
      # Each field below is a TRISTATE: explicit value, empty string (""), or
      # absent. Empty/absent means "inherit" — for back-compat the operator's
      # baseline default is still PERMISSIVE (`InsecureSkipVerify=true`, Go-default
      # TLS version), matching pre-0.27.1 behavior. Set explicit values here to
      # tighten across every CHI managed by this operator. A CHI may override
      # per-cluster via `spec.configuration.clusters[].security.clickhouse.tls`.
      tls:
        # `verify`: does the client verify the server's certificate chain?
        #   "Strict" — verify server cert against `rootCA` (or system roots if
        #              empty). Hostname must match `serverName` (or the dial
        #              host if `serverName` is empty). MITM-resistant.
        #   "None"   — skip verification entirely. Connection is encrypted but
        #              an attacker can intercept transparently. Useful only for
        #              development/self-signed clusters.
        #   ""       — preserve legacy behavior: equivalent to "None" today, but
        #              re-evaluated by the future master switch. Will become
        #              "Strict" once the FIPS profile is enforced.
        verify: ""
        # `minVersion`: minimum negotiated TLS version. Empty uses Go stdlib
        # default (currently TLS 1.2). FIPS Strict coerces to "1.3".
        #   "1.2" | "1.3" | ""
        minVersion: ""
        # `serverName`: SNI name + name that the server cert must match when
        # `verify=Strict`. Empty derives it from the dial host (typically the
        # pod's headless-service FQDN). Set this when the cert is issued to a
        # different name than the dial address (e.g. a wildcard or service-CN).
        serverName: ""
        # `rootCA`: PEM-encoded CA bundle used to validate the server cert when
        # `verify=Strict`. Accepts raw PEM or base64-wrapped PEM. Empty means
        # use the system CA roots from the operator pod's trust store.
        rootCA: ""
        # `rootCASecretRef`: alternate source — read the PEM CA from a Kubernetes
        # Secret. The operator resolves it at CHI normalize time and inlines the
        # value into `rootCA`. Mutually exclusive with the inline `rootCA` above
        # — setting both aborts the CR with reason RootCAConflict.
        #
        # `key` defaulting: when omitted, the operator tries "ca.crt" first
        # (cert-manager / kubernetes.io/tls convention), then "tls.crt" as a
        # fallback. Override `key:` for hand-rolled Secrets with custom layouts.
        #
        # Namespace: SecretKeySelector has no namespace field. The Secret is
        # expected in the CHI's namespace (for cluster-level refs) or the
        # operator's namespace (for CHOP-config-level refs).
        #
        # Missing Secret/key aborts the CR with reason RootCASecretUnresolved.
        # There is no silent fallback to system roots, because empty CA +
        # Verify=Strict would refuse every dial.
        rootCASecretRef:
         name: my-ca-secret
         key:  ca.crt
    zookeeper:
      # TLS knobs for the operator's ZooKeeper / Keeper client. Existing ZK TLS
      # already loads cert/key/CA + ServerName separately; these knobs add
      # MinVersion + InsecureSkipVerify control on top of that path.
      tls:
        # Same tristate semantics as `clickhouse.tls.verify`, but the ZK baseline
        # is more conservative: when the existing ZK TLS path is active (cert+key+CA
        # are wired up), "Strict" is the effective default. Set "None" here to
        # opt out of cert verification for a development ZK ensemble.
        verify: ""
        # Same semantics as `clickhouse.tls.minVersion`. Empty = Go default (1.2).
        minVersion: ""
    kubernetes:
      tls:
        # `verify`: TLS posture applied as a LOAD-TIME GATE against the kubeconfig.
        # Unlike clickhouse/zookeeper, the operator does NOT build the kubeconfig
        # tls.Config — client-go reads TLSClientConfig.Insecure from disk. This
        # knob only refuses or permits startup based on what the kubeconfig says.
        #   "Strict" — refuse startup if the kubeconfig has Insecure=true.
        #   "None"   — explicit opt-in: permit an insecure kubeconfig.
        #   ""       — preserve current behavior (kubeconfig wins).
        verify: ""
        # `minVersion`: floor TLS at this protocol version. Declared here for
        # shape uniformity and FIPS coercion symmetry, but NOT yet enforced on
        # the operator's K8s API transport.
        #   "1.2" | "1.3" | ""
        minVersion: ""
    # Operator↔metrics-exporter REST channel (`/chi` on port 8888) hardening.
    # Plain (default) preserves today's behavior: server binds all interfaces,
    # no auth. Secure rejects non-loopback callers at the /chi handler AND
    # requires an X-CHOP-Token bearer-token header on every request. The
    # operator provisions the token at startup (32 bytes from crypto/rand,
    # hex-encoded) into a shared Pod-local emptyDir volume mounted into
    # both containers.
    ipc:
      # `mode`: IPC channel posture.
      #   "Plain"  — default. Server binds all interfaces, no auth required.
      #   "Secure" — bind loopback only, require X-CHOP-Token on every call.
      mode: "Plain"
      # `bindHost`: address the IPC server binds to in Secure mode. Empty
      # defaults to "127.0.0.1". Ignored in Plain mode (server still binds
      # all interfaces).
      bindHost: ""
      # `tokenPath`: filesystem path to the shared Pod-local token file used
      # by both containers in Secure mode. Empty defaults to
      # "/etc/clickhouse-operator-ipc/token". An advanced GitOps/Vault use
      # case — sourcing the token from a Kubernetes Secret — is supported
      # via a Deployment volume override (no CRD field). See
      # docs/security_hardening.md → Externally-managed token (advanced).
      tokenPath: ""
    # Axis 1 — Operator-wide TLS-hardening master switch. Permissive (default)
    # preserves 0.27.0 behavior — no coercion, no rejection. Enforced coerces
    # all transport knobs above to their Strict positions at startup
    # (clickhouse.tls.verify=Strict, clickhouse.tls.minVersion=1.3,
    # zookeeper.tls.verify=Strict, zookeeper.tls.minVersion=1.3,
    # kubernetes.tls.verify=Strict, kubernetes.tls.minVersion=1.3,
    # ipc.mode=Secure), re-registers the ClickHouse legacy TLS config to
    # verifying mode (no InsecureSkipVerify), coerces clickhouse.access.scheme
    # http→https, rejects ZK `digest:` auth files, and rejects CHIs that
    # cannot be served in a FIPS-compatible posture (e.g. CHIs referencing
    # plain-text external ZooKeeper). Transport hardening only — does NOT
    # assert the binary is FIPS-linked; that is the orthogonal `fips.enforced`
    # axis below.
    policy: Permissive
    # Axis 2 — FIPS cryptographic-module gate. Orthogonal to `policy`. When
    # `enforced: true`, the operator Fatals at startup unless the binary was
    # built with GOFIPS140 and crypto/fips140 reports Enabled (i.e. the
    # process is running with GODEBUG=fips140=on or fips140=only). Also
    # triggers the same TLS coercions as `policy: Enforced` — a FIPS-asserted
    # operator necessarily wants verified TLS.
    #
    # The default image runs with GODEBUG=fips140=on (TLS filtering;
    # the spec-default mode for GOFIPS140-built binaries). The strict
    # variant `:<version>-fips` runs with GODEBUG=fips140=only and is
    # opt-in defense-in-depth.
    fips:
      enforced: false
    images:
      # Axis 3 — Workload supply-chain gate, orthogonal to `policy` and
      # `fips.enforced`. Permissive (default) accepts any image; FIPSRequired
      # refuses CRs whose CH/Keeper images lack the "fips" tag substring
      # (admission) AND aborts running CRs whose `SELECT version()` lacks
      # "fips" (post-Ready confirmation). See docs/security_hardening.md
      # → "security.images.policy: FIPSRequired" for the full policy details
      # and recovery procedure.
      policy: Permissive

  ################################################
  ##
  ## Templates Section
  ##
  ################################################
  template:
    chi:
      # Path to the folder where ClickHouseInstallation .yaml manifests are located.
      # Manifests are applied in sorted alpha-numeric order.
      path: templates.d

  ################################################
  ##
  ## Reconcile Section
  ##
  ################################################
  reconcile:
    # Reconcile runtime settings
    runtime:
      # Max number of concurrent CHI reconciles in progress
      reconcileCHIsThreadsNumber: 10

      # The operator reconciles shards concurrently in each CHI with the following limitations:
      #   1. Number of shards being reconciled (and thus having hosts down) in each CHI concurrently
      #      can not be greater than 'reconcileShardsThreadsNumber'.
      #   2. Percentage of shards being reconciled (and thus having hosts down) in each CHI concurrently
      #      can not be greater than 'reconcileShardsMaxConcurrencyPercent'.
      #   3. The first shard is always reconciled alone. Concurrency starts from the second shard and onward.
      # Thus limiting number of shards being reconciled (and thus having hosts down) in each CHI by both number and percentage

      # Max number of concurrent shard reconciles within one cluster in progress
      reconcileShardsThreadsNumber: 5
      # Max percentage of concurrent shard reconciles within one cluster in progress
      reconcileShardsMaxConcurrencyPercent: 50

    # Reconcile StatefulSet scenario
    statefulSet:
      # Create StatefulSet scenario
      create:
        # What to do in case created StatefulSet is not in 'Ready' after `reconcile.statefulSet.update.timeout` seconds
        # Possible options:
        # 1. abort - abort the process, do nothing with the problematic StatefulSet, leave it as it is,
        #    do not try to fix or delete or update it, just abort reconcile cycle.
        #    Do not proceed to the next StatefulSet(s) and wait for an admin to assist.
        # 2. delete - delete newly created problematic StatefulSet and follow 'abort' path afterwards.
        # 3. ignore - ignore an error, pretend nothing happened, continue reconcile and move on to the next StatefulSet.
        onFailure: ignore

      # Update StatefulSet scenario
      update:
        # How many seconds to wait for created/updated StatefulSet to be 'Ready'
        timeout: 300
        # How many seconds to wait between checks/polls for created/updated StatefulSet status
        pollInterval: 5
        # What to do in case updated StatefulSet is not in 'Ready' after `reconcile.statefulSet.update.timeout` seconds
        # Possible options:
        # 1. abort - abort the process, do nothing with the problematic StatefulSet, leave it as it is,
        #    do not try to fix or delete or update it, just abort reconcile cycle.
        #    Do not proceed to the next StatefulSet(s) and wait for an admin to assist.
        # 2. rollback - delete Pod and rollback StatefulSet to previous Generation.
        #    Pod would be recreated by StatefulSet based on rollback-ed StatefulSet configuration.
        #    Follow 'abort' path afterwards.
        # 3. ignore - ignore an error, pretend nothing happened, continue reconcile and move on to the next StatefulSet.
        onFailure: abort

    # Reconcile Host scenario
    host:
      # Whether the operator during reconcile procedure should wait for a ClickHouse host:
      #   - to be excluded from a ClickHouse cluster
      #   - to complete all running queries
      #   - to be included into a ClickHouse cluster
      # respectfully before moving forward with host reconcile
      wait:
        exclude: "true"
        queries: "true"
        include: "false"
        # The operator during reconcile procedure should wait for replicas to catch-up
        # replication delay a.k.a replication lag for the following replicas
        replicas:
          # All replicas (new and known earlier) are explicitly requested to wait for replication to catch-up
          all: "no"
          # New replicas only are requested to wait for replication to catch-up
          new: "yes"
          # Replication catch-up is considered to be completed as soon as replication delay
          # a.k.a replication lag - calculated as "MAX(absolute_delay) FROM system.replicas"
          # is within this specified delay (in seconds)
          delay: 10
        probes:
          # Whether the operator during host launch procedure should wait for startup probe to succeed.
          # In case probe is unspecified wait is assumed to be completed successfully.
          # Default option value is to do not wait.
          startup: "no"
          # Whether the operator during host launch procedure should wait for readiness probe to succeed.
          # In case probe is unspecified wait is assumed to be completed successfully.
          # Default option value is to wait.
          readiness: "yes"

    ################################################
    ##
    ## Coordination with external systems during reconcile
    ##
    ################################################
    coordination:
      keeper:
        # How long the operator waits for a referenced ClickHouseKeeper to become ready
        # before aborting CHI reconcile. In seconds.
        readyTimeout: 120
        # Reaction when a referenced CHK resource changes:
        #   none (default) — do nothing
        #   reconcile — trigger CHI reconcile
        onKeeperResourceUpdate: none

    ################################################
    ##
    ## Auto-recovery from aborted reconcile
    ##
    ################################################
    recovery:
      from:
        aborted:
          # When a reconcile lands in status=Aborted (due to FIPS coercion
          # conflict, plain-text ZK under FIPS, etc.), the operator can
          # auto-recover when the CHI's pods transition NotReady→Ready.
          # Values:
          #   retry (default) — re-enqueue the CHI on pod-Ready transition.
          #   none            — disable auto-recovery; operator user must
          #                     edit the CR spec to retrigger normalize.
          onPodReady: retry

  ################################################
  ##
  ## Annotations management
  ##
  ################################################
  annotation:
    # Applied when:
    #  1. Propagating annotations from the CHI's `metadata.annotations` to child objects' `metadata.annotations`,
    #  2. Propagating annotations from the CHI Template's `metadata.annotations` to CHI's `metadata.annotations`,
    # Include annotations from the following list:
    # Applied only when not empty. Empty list means "include all, no selection"
    include: []
    # Exclude annotations from the following list:
    exclude: []

  ################################################
  ##
  ## Labels management
  ##
  ################################################
  label:
    # Applied when:
    #  1. Propagating labels from the CHI's `metadata.labels` to child objects' `metadata.labels`,
    #  2. Propagating labels from the CHI Template's `metadata.labels` to CHI's `metadata.labels`,
    # Include labels from the following list:
    # Applied only when not empty. Empty list means "include all, no selection"
    include: []
    # Exclude labels from the following list:
    exclude: []
    # Whether to append *Scope* labels to StatefulSet and Pod.
    # Full list of available *scope* labels check in labeler.go
    #  LabelShardScopeIndex
    #  LabelReplicaScopeIndex
    #  LabelCHIScopeIndex
    #  LabelCHIScopeCycleSize
    #  LabelCHIScopeCycleIndex
    #  LabelCHIScopeCycleOffset
    #  LabelClusterScopeIndex
    #  LabelClusterScopeCycleSize
    #  LabelClusterScopeCycleIndex
    #  LabelClusterScopeCycleOffset
    appendScope: "no"

  ################################################
  ##
  ## StatefulSet management
  ##
  ################################################
  statefulSet:
    revisionHistoryLimit: 0

  ################################################
  ##
  ## Pod management
  ##
  ################################################
  pod:
    # Grace period for Pod termination.
    # How many seconds to wait between sending
    # SIGTERM and SIGKILL during Pod termination process.
    # Increase this number is case of slow shutdown.
    terminationGracePeriod: 30

  ################################################
  ##
  ## Log parameters
  ##
  ################################################
  logger:
    logtostderr: "true"
    alsologtostderr: "false"
    v: "1"
    stderrthreshold: ""
    vmodule: ""
    log_backtrace_at: ""
