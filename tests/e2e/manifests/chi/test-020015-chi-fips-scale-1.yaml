# test-plan §6 CH row 6 — FIPS scale-up (start: 1 replica).
# Pair with test-020015-chi-fips-scale-2.yaml (same CHI name, replicasCount=2).
apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-020015-chi-fips-scale
spec:
  defaults:
    templates:
      podTemplate: fips
  configuration:
    clusters:
      - name: default
        secure: "yes"
        insecure: "no"
        layout:
          shardsCount: 1
          replicasCount: 1
    settings:
      http_port: _removed_
      tcp_port: _removed_
      mysql_port: _removed_
      postgresql_port: _removed_
      interserver_http_port: _removed_
      tcp_port_secure: 9440
      https_port: 8443
    files:
      openssl.xml: |
        <yandex>
          <openSSL>
            <server>
              <certificateFile>/etc/clickhouse-server/secrets.d/server.crt/clickhouse-certs/server.crt</certificateFile>
              <privateKeyFile>/etc/clickhouse-server/secrets.d/server.key/clickhouse-certs/server.key</privateKeyFile>
              <dhParamsFile>/etc/clickhouse-server/secrets.d/dhparam.pem/clickhouse-certs/dhparam.pem</dhParamsFile>
              <verificationMode>none</verificationMode>
              <loadDefaultCAFile>true</loadDefaultCAFile>
              <cacheSessions>true</cacheSessions>
              <disableProtocols>sslv2,sslv3</disableProtocols>
              <preferServerCiphers>true</preferServerCiphers>
            </server>
          </openSSL>
        </yandex>
      server.crt:
        valueFrom:
          secretKeyRef:
            name: clickhouse-certs
            key: server.crt
      server.key:
        valueFrom:
          secretKeyRef:
            name: clickhouse-certs
            key: server.key
      dhparam.pem:
        valueFrom:
          secretKeyRef:
            name: clickhouse-certs
            key: dhparam.pem
  templates:
    podTemplates:
      - name: fips
        spec:
          containers:
            - name: clickhouse
              image: altinity/clickhouse-server:25.3.8.30001.altinityfips
              imagePullPolicy: IfNotPresent
