apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-030007-chi-bypass
spec:
  # Spec-level security explicitly relaxes verify; under FIPS enforced the
  # normalizer rejectFIPSBypass must abort before any StatefulSet is created.
  security:
    clickhouse:
      tls:
        verify: None
  configuration:
    clusters:
      - name: c1
        layout:
          shardsCount: 1
          replicasCount: 1
