apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-030008-case-insensitive
spec:
  defaults:
    templates:
      podTemplate: case-fips
  configuration:
    clusters:
      - name: c1
        layout:
          shardsCount: 1
          replicasCount: 1
  templates:
    podTemplates:
      # Image tag uses uppercase "FIPS" — case-insensitive match SHALL
      # still detect this as a FIPS image.
      # Image is unpullable; we only verify admission acceptance.
      - name: case-fips
        spec:
          containers:
            - name: clickhouse
              image: example.com/clickhouse-server:25.3.FIPS
