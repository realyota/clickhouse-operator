apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-030008-shortcircuit
spec:
  configuration:
    # Two replicas, both using the operator default image
    # (clickhouse/clickhouse-server:latest), which lacks the "fips" tag
    # substring. Under security.images.policy=FIPSRequired the operator
    # MUST produce a single FIPSImagePolicyViolation, not one per host.
    clusters:
      - name: c1
        layout:
          shardsCount: 1
          replicasCount: 2
