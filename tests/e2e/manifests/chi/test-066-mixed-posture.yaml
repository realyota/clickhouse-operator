apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-066-mixed-posture
spec:
  configuration:
    clusters:
      - name: strict-cluster
        # Cluster-level security overrides the (empty) CHI default. With these
        # knobs set, ensureClusterSchemer's OverlayClusterSecurityTLS produces a
        # distinct TLSConfigKey hash from the lax cluster below.
        security:
          clickhouse:
            tls:
              verify: Strict
              minVersion: "1.3"
              serverName: strict.example
        layout:
          shardsCount: 1
          replicasCount: 1
      - name: lax-cluster
        security:
          clickhouse:
            tls:
              verify: None
              minVersion: "1.2"
        layout:
          shardsCount: 1
          replicasCount: 1
