apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-073-zk-explicit-false
spec:
  configuration:
    # External ZooKeeper with explicit secure: false — exercises the
    # HasValue() && !Value() branch of the FIPS strict ZK gate
    # (distinct from missing-secure which exercises !HasValue()).
    zookeeper:
      nodes:
        - host: zookeeper
          port: 2181
          secure: "false"
    clusters:
      - name: c1
        layout:
          shardsCount: 1
          replicasCount: 1
