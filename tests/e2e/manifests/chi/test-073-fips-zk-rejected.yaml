apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-073-zk-no-tls
spec:
  configuration:
    # External ZooKeeper without secure: true — must be rejected under FIPS strict.
    zookeeper:
      nodes:
        - host: zookeeper
          port: 2181
    clusters:
      - name: c1
        layout:
          shardsCount: 1
          replicasCount: 1
