apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: test-074-non-fips
spec:
  configuration:
    # No PodTemplate → host resolves to operator default image
    # (clickhouse/clickhouse-server:latest), which lacks the "fips" tag
    # substring and MUST be rejected under security.fips.images.policy=Required.
    clusters:
      - name: c1
        layout:
          shardsCount: 1
          replicasCount: 1
