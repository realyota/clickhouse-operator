apiVersion: "clickhouse-keeper.altinity.com/v1"
kind: "ClickHouseKeeperInstallation"
metadata:
  name: test-020009-chk-bypass
spec:
  # Spec-level security explicitly relaxes verify; InheritClusterSecurityFrom
  # propagates it into every cluster, so under FIPS strict this is a bypass
  # attempt that rejectFIPSBypass must catch.
  security:
    clickhouse:
      tls:
        verify: None
  configuration:
    clusters:
      - name: keeper
        layout:
          replicasCount: 1
