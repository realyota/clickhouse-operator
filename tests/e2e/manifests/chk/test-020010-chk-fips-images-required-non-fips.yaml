apiVersion: "clickhouse-keeper.altinity.com/v1"
kind: "ClickHouseKeeperInstallation"
metadata:
  name: test-020010-non-fips-keeper
spec:
  # No PodTemplate → host resolves to operator default Keeper image
  # (clickhouse/clickhouse-keeper:latest), which lacks the "fips" tag substring
  # and MUST be rejected under security.images.policy=Required.
  configuration:
    clusters:
      - name: keeper
        layout:
          replicasCount: 1
