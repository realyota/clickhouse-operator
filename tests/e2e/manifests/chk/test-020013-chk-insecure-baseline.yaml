apiVersion: "clickhouse-keeper.altinity.com/v1"
kind: "ClickHouseKeeperInstallation"
metadata:
  name: test-020013-insecure
spec:
  # Legacy CHK shape: no cluster.secure flag. Used by test_020013 as a
  # regression sentinel — secure-flag normalizer changes must be dormant here
  # (no zk-secure Service port, no <secure>1</secure> in Raft XML). Mirrors
  # test-020011 minus the secure flag so any divergence is attributable to
  # cluster.secure alone.
  defaults:
    templates:
      podTemplate: default
  configuration:
    clusters:
      - name: "keeper"
        layout:
          replicasCount: 1
    settings:
      logger/level: "information"
      logger/console: "true"
      listen_host: "0.0.0.0"
      keeper_server/four_letter_word_white_list: "*"
  templates:
    podTemplates:
      - name: default
        spec:
          containers:
            - name: clickhouse-keeper
              image: "clickhouse/clickhouse-keeper:25.3"
