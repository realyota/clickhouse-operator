apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseOperatorConfiguration"
metadata:
  name: "test-077-fips-tls-wrong-ca-chopconf"
spec:
  clickhouse:
    access:
      scheme: https
  security:
    clickhouse:
      tls:
        # Strict verification activates the FIPS-built TLS stack and refuses
        # any cert that does not chain to the configured rootCA. Combined
        # with the deliberately-wrong CA below, every operator -> ClickHouse
        # connection attempt must fail with a verification error — proving
        # the FIPS-built crypto path is actually executing on the wire
        # rather than silently downgrading to InsecureSkipVerify=true.
        verify: Strict
        # Self-signed CA generated specifically for this test
        # (CN=test-077-unrelated-ca.example). It is NOT the issuer of the
        # ClickHouse server cert provisioned by test-058-secret.yaml, so the
        # operator's TLS handshake fails at chain verification — proving the
        # FIPS-built crypto path actually validates the chain rather than
        # silently downgrading to InsecureSkipVerify=true.
        rootCA: |-
          -----BEGIN CERTIFICATE-----
          MIIDMTCCAhmgAwIBAgIUW3Bc7vzCdyEauj+8RIRKaAPhx4IwDQYJKoZIhvcNAQEL
          BQAwKDEmMCQGA1UEAwwddGVzdC0wNzctdW5yZWxhdGVkLWNhLmV4YW1wbGUwHhcN
